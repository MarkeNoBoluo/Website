{% extends "admin/base.html" %}

{% block title %}新建待办 - Admin{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>待办事项</span>
    <span>&gt;</span>
    <span>新建</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">创建待办</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label>标题</label>
        <input type="text" name="title" class="form-control" required value="{{ form_data.title if form_data else '' }}">
    </div>

    <div class="form-group">
        <label>描述</label>
        <textarea name="description" class="form-control" rows="4">{{ form_data.description if form_data else '' }}</textarea>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
            <label>象限</label>
            <select name="quadrant" class="form-control">
                <option value="1">Q1 - 紧急且重要</option>
                <option value="2" selected>Q2 - 重要不紧急</option>
                <option value="3">Q3 - 紧急不重要</option>
                <option value="4">Q4 - 不紧急不重要</option>
            </select>
        </div>

        <div class="form-group">
            <label>优先级</label>
            <select name="priority" class="form-control">
                <option value="1">1 - 最高</option>
                <option value="2">2 - 高</option>
                <option value="3" selected>3 - 中</option>
                <option value="4">4 - 低</option>
                <option value="5">5 - 最低</option>
            </select>
        </div>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">创建待办</button>
        <a href="{{ url_for('admin.todos') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
