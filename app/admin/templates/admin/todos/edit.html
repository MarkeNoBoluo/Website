{% extends "admin/base.html" %}

{% block title %}Edit Todo - Admin{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>Todos</span>
    <span>&gt;</span>
    <span>Edit</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">Edit Todo</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    
    <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="form-control" required value="{{ todo.title }}">
    </div>
    
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="form-control" rows="4">{{ todo.description or '' }}</textarea>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
            <label>Quadrant</label>
            <select name="quadrant" class="form-control">
                <option value="1" {% if todo.quadrant == 1 %}selected{% endif %}>Q1 - Urgent & Important</option>
                <option value="2" {% if todo.quadrant == 2 %}selected{% endif %}>Q2 - Important</option>
                <option value="3" {% if todo.quadrant == 3 %}selected{% endif %}>Q3 - Urgent</option>
                <option value="4" {% if todo.quadrant == 4 %}selected{% endif %}>Q4 - Neither</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Priority</label>
            <select name="priority" class="form-control">
                {% for p in range(1, 6) %}
                <option value="{{ p }}" {% if todo.priority == p %}selected{% endif %}> {{ p }} - {% if p == 1 %}Highest{% elif p == 5 %}Lowest{% endif %}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" name="completed" {% if todo.completed %}checked{% endif %}>
            Completed
        </label>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('admin.todos') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
