{% extends "admin/base.html" %}

{% block title %}编辑待办 - Admin{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>待办事项</span>
    <span>&gt;</span>
    <span>编辑</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">编辑待办</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
        <label>标题</label>
        <input type="text" name="title" class="form-control" required value="{{ todo.title }}">
    </div>

    <div class="form-group">
        <label>描述</label>
        <textarea name="description" class="form-control" rows="4">{{ todo.description or '' }}</textarea>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
            <label>象限</label>
            <select name="quadrant" class="form-control">
                <option value="1" {% if todo.quadrant == 1 %}selected{% endif %}>Q1 - 紧急且重要</option>
                <option value="2" {% if todo.quadrant == 2 %}selected{% endif %}>Q2 - 重要不紧急</option>
                <option value="3" {% if todo.quadrant == 3 %}selected{% endif %}>Q3 - 紧急不重要</option>
                <option value="4" {% if todo.quadrant == 4 %}selected{% endif %}>Q4 - 不紧急不重要</option>
            </select>
        </div>

        <div class="form-group">
            <label>优先级</label>
            <select name="priority" class="form-control">
                {% for p in range(1, 6) %}
                <option value="{{ p }}" {% if todo.priority == p %}selected{% endif %}> {{ p }} - {% if p == 1 %}最高{% elif p == 5 %}最低{% endif %}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" name="completed" {% if todo.completed %}checked{% endif %}>
            已完成
        </label>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">保存修改</button>
        <a href="{{ url_for('admin.todos') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
