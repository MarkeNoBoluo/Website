{% extends "admin/base.html" %}

{% block title %}新建文章 - 管理后台{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>文章</span>
    <span>&gt;</span>
    <span>新建</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">新建文章</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    
    <div class="form-group">
        <label>标题</label>
        <input type="text" name="title" class="form-control" required value="{{ form_data.title if form_data else '' }}">
    </div>
    
    <div class="form-group">
        <label>内容（Markdown）</label>
        <textarea name="content" class="form-control" rows="15">{{ form_data.content if form_data else '' }}</textarea>
    </div>
    
    <div class="form-group">
        <label>状态</label>
        <select name="status" class="form-control" style="width: auto;">
            <option value="draft">草稿</option>
            <option value="published">已发布</option>
        </select>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">创建文章</button>
        <a href="{{ url_for('admin.articles') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
