{% extends "admin/base.html" %}

{% block title %}Edit User - Admin{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>Users</span>
    <span>&gt;</span>
    <span>Edit</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">Edit User</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    
    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required value="{{ user.username }}">
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
