{% extends "admin/base.html" %}

{% block title %}New User - Admin{% endblock %}

{% block breadcrumbs %}
    <span>&gt;</span>
    <span>Users</span>
    <span>&gt;</span>
    <span>New</span>
{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1.5rem;">New User</h2>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    
    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required value="{{ form_data.username if form_data else '' }}">
    </div>
    
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
