{% extends "base.html" %}

{% block title %}{{ article.title }} - Blog{% endblock %}

{% block content %}
<article class="article-detail">
    <header class="article-header">
        <h1 class="article-title">{{ article.title }}</h1>

        <div class="article-meta">
            <time datetime="{{ article.date.isoformat() }}">
                {{ article.date.strftime('%B %d, %Y') }}
            </time>
        </div>
    </header>

    <div class="article-content">
        {{ article.content|safe }}
    </div>

    <footer class="article-footer">
        <a href="{{ url_for('blog.index') }}" class="back-to-blog">
            ← Back to all articles
        </a>
    </footer>
</article>
{% endblock %}

{% block extra_css %}
<style>
.article-detail {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
}

.article-header {
    margin-bottom: 2rem;
    border-bottom: 1px solid #444;
    padding-bottom: 1rem;
}

.article-title {
    font-size: 2.5rem;
    margin: 0 0 0.5rem 0;
    line-height: 1.2;
}

.article-meta {
    color: #aaaaaa;
    font-size: 1rem;
}

.article-content {
    line-height: 1.8;
    font-size: 1.1rem;
}

.article-content h2 {
    font-size: 1.8rem;
    margin: 2rem 0 1rem 0;
    color: #ffffff;
}

.article-content h3 {
    font-size: 1.5rem;
    margin: 1.5rem 0 0.75rem 0;
    color: #eeeeee;
}

.article-content p {
    margin: 1rem 0;
}

.article-content code {
    background: #333;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
}

.article-content pre {
    background: #1e1e1e;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 1.5rem 0;
}

.article-footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid #444;
}

.back-to-blog {
    color: #64b5f6;
    text-decoration: none;
    font-weight: 500;
}

.back-to-blog:hover {
    text-decoration: underline;
}

@media (min-width: 768px) {
    .article-detail {
        padding: 3rem 2rem;
    }

    .article-title {
        font-size: 3rem;
    }
}
</style>
{% endblock %}
