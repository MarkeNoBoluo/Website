<div class="task-card" draggable="true" data-task-id="{{ todo.id }}" data-priority="{{ todo.priority }}">
    <div class="task-header">
        <span class="priority-indicator priority-{{ todo.priority }}"></span>
        <h3 class="task-title">{{ todo.title }}</h3>
        <div class="task-actions">
            <form action="{{ url_for('todo.toggle', id=todo.id) }}" method="post" class="inline-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn-toggle" title="{{ 'Mark incomplete' if todo.completed else 'Mark complete' }}">
                    {{ '✓' if todo.completed else '○' }}
                </button>
            </form>
            <a href="{{ url_for('todo.edit', id=todo.id) }}" class="btn-edit" title="Edit">✎</a>
            <form action="{{ url_for('todo.delete', id=todo.id) }}" method="post" class="inline-form delete-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn-delete" title="Delete" onclick="return confirm('Are you sure you want to delete this task?')">×</button>
            </form>
        </div>
    </div>

    {% if todo.description %}
    <div class="task-description">
        {{ todo.description }}
    </div>
    {% endif %}

    <div class="task-footer">
        <span class="task-meta">
            {% if todo.due_date %}
            <span class="due-date">Due: {{ todo.due_date.strftime('%Y-%m-%d') }}</span>
            {% endif %}
            <span class="priority-label">Priority: {{ todo.priority }}/5</span>
        </span>
        <span class="task-status {{ 'completed' if todo.completed else 'pending' }}">
            {{ 'Completed' if todo.completed else 'Pending' }}
        </span>
    </div>
</div>
