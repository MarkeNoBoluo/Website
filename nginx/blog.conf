# Nginx configuration for Flask blog application on Raspberry Pi
# Reverse proxy configuration with static file serving and gzip compression

server {
    # Basic server setup
    listen 8080;
    server_name localhost;

    # Root directory for static files
    root /home/wddkxg/blog/app/static;

    # Access and error logs
    access_log /home/wddkxg/blog/logs/nginx_access.log;
    error_log /home/wddkxg/blog/logs/nginx_error.log;

    # Gzip compression (per user decision)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        text/plain;

    # Client limits (per user decision)
    client_max_body_size 10M;
    client_body_timeout 12s;
    client_header_timeout 12s;

    # Static file serving
    location /static/ {
        # Serve static files directly from app/static directory
        alias /home/wddkxg/blog/app/static/;

        # NO caching headers (per user decision for simpler debugging)
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        # Disable logging for static files to reduce log noise
        access_log off;
        log_not_found off;
    }

    # Reverse proxy to Gunicorn via Unix socket
    location / {
        # Proxy to Gunicorn Unix socket
        proxy_pass http://unix:/tmp/blog.sock:;

        # Set proper headers for Flask application
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Error pages (per user decision - use default Nginx error pages)
    # No custom error page configuration - using default Nginx error pages

    # Note on socket permissions:
    # Nginx user (www-data) needs access to /tmp/blog.sock
    # Solution: sudo usermod -a -G wddkxg www-data then restart Nginx
    # This allows www-data user (Nginx) to access socket created by wddkxg user (Gunicorn)
}